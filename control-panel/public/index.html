<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>社交媒体发布管理平台</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="toast-root" class="toast-root"></div>
  <div class="container">
    <header class="header">
      <div class="header-content">
        <!-- <h1 class="title">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
          Social Media Publisher
        </h1> -->
        <div class="status-indicator-compact">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-text" id="connectionStatus">未连接</span>
          <span class="status-divider">|</span>
          <span class="device-label">设备:</span>
          <span class="device-value" id="deviceInfo">-</span>
          <button class="btn-refresh-mini" id="refreshStatus">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"></polyline>
              <polyline points="1 20 1 14 7 14"></polyline>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="main-content">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="weibo">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path>
          </svg>
          微博发布
        </button>
        <button class="tab-btn" data-tab="douyin">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
            <polyline points="2 17 12 22 22 17"></polyline>
            <polyline points="2 12 12 17 22 12"></polyline>
          </svg>
          抖音发布
        </button>
        <button class="tab-btn" data-tab="kuaishou">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          快手发布
        </button>
      </div>

      <!-- Weibo Tab Content -->
      <section class="tab-content active" id="weibo-content">
        <div class="card publish-card">
          <div class="card-header">
            <h2 class="card-title">
              <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
              </svg>
              微博配置
            </h2>
          </div>
          <div class="form-group">
            <label class="form-label" for="tailTagInput">
              <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                <line x1="7" y1="7" x2="7.01" y2="7"></line>
              </svg>
              尾部标签
            </label>
            <input class="form-input" id="tailTagInput" type="text" placeholder="#话题标签 #程序员" />
          </div>
          <div class="form-group">
            <label class="form-label" for="contentInput">
              <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
              文案内容（JSON数组格式，多条文案）
            </label>
            <textarea class="form-textarea" id="contentInput" rows="12" placeholder='[
  "第一条文案内容...",
  "第二条文案内容...",
  "第三条文案内容..."
]'></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="weiboImagePathsInput">
              <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
              图片路径列表（JSON数组格式）
            </label>
            <textarea class="form-textarea" id="weiboImagePathsInput" rows="8" placeholder='[
  "user/926182/2025-12-15/83693f6a44c4a34",
  "user/926182/2025-12-15/93693f6a4717c79"
]'></textarea>
            <div class="image-preview-container" id="imagePreviewContainer"></div>
          </div>
          <div class="button-group">
            <button class="btn btn-secondary" id="saveConfig">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                <polyline points="7 3 7 8 15 8"></polyline>
              </svg>
              保存配置
            </button>
            <button class="btn btn-primary" id="publishBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
              立即发布
            </button>
          </div>
          <p class="hint">
            <svg class="hint-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
            保存配置后，点击发布将内容推送至手机端
          </p>
        </div>
      </section>

      <!-- Douyin Tab Content -->
      <section class="tab-content" id="douyin-content">
        <div class="card publish-card">
          <div class="card-header">
            <h2 class="card-title">
              <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
              </svg>
              抖音配置
            </h2>
          </div>
          <div class="form-group">
            <label class="form-label" for="douyinTailTagInput">
              <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                <line x1="7" y1="7" x2="7.01" y2="7"></line>
              </svg>
              话题标签
            </label>
            <input class="form-input" id="douyinTailTagInput" type="text" placeholder="#前端 #程序员" />
          </div>
          <div class="form-group">
            <label class="form-label" for="douyinContentInput">
              <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
              文案内容（JSON数组格式，多条文案）
            </label>
            <textarea class="form-textarea" id="douyinContentInput" rows="12" placeholder='[
  "第一条抖音文案内容...",
  "第二条抖音文案内容...",
  "第三条抖音文案内容..."
]'></textarea>
          </div>
          <div class="button-group">
            <button class="btn btn-secondary" id="saveConfigDouyin">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                <polyline points="7 3 7 8 15 8"></polyline>
              </svg>
              保存配置
            </button>
            <button class="btn btn-primary" id="publishBtnDouyin">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
              立即发布
            </button>
          </div>
          <p class="hint">
            <svg class="hint-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
            保存配置后，点击发布将内容推送至手机端
          </p>
        </div>
      </section>

      <!-- Kuaishou Tab Content -->
      <section class="tab-content" id="kuaishou-content">
        <div class="card publish-card">
          <div class="card-header">
            <h2 class="card-title">
              <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
              </svg>
              快手配置
            </h2>
          </div>
          <div class="form-group">
            <label class="form-label" for="kuaishouContentInput">
              <svg class="label-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
              文案内容
            </label>
            <textarea class="form-textarea" id="kuaishouContentInput" rows="8" placeholder="请输入快手文案内容..."></textarea>
          </div>
          <div class="button-group">
            <button class="btn btn-secondary" id="saveConfigKuaishou">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                <polyline points="17 21 17 13 7 13 7 21"></polyline>
                <polyline points="7 3 7 8 15 8"></polyline>
              </svg>
              保存配置
            </button>
            <button class="btn btn-primary" id="publishBtnKuaishou">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
              立即发布
            </button>
          </div>
          <p class="hint">
            <svg class="hint-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="12" y1="16" x2="12" y2="12"></line>
              <line x1="12" y1="8" x2="12.01" y2="8"></line>
            </svg>
            保存配置后，点击发布将内容推送至手机端
          </p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-content">
        <span class="footer-text">
          <svg class="footer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          <span id="now"></span>
        </span>
        <span class="footer-badge">Powered by Express + WebSocket</span>
      </div>
    </footer>
  </div>

  <script src="main.js" type="module"></script>
</body>
</html>
